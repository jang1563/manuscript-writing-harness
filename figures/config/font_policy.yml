font_policy_id: "publication_sans"
families:
  sans_preferred:
    - "DejaVu Sans"
    - "Liberation Sans"
  sans_fallbacks:
    - "Arial"
    - "Helvetica"
    - "Nimbus Sans"
  mono_preferred:
    - "DejaVu Sans Mono"
    - "Liberation Mono"
  mono_fallbacks:
    - "Courier New"
    - "Courier"
    - "Liberation Mono"
    - "DejaVu Sans Mono"
python:
  family: "sans-serif"
  pdf_fonttype: 42
  ps_fonttype: 42
  svg_fonttype: "none"
r:
  pdf_device: "cairo_pdf"
  svg_device: "svglite"
  raster_device: "ragg_png"
requirements:
  editable_text: true
  outline_text: false
  min_text_size_pt: 5
  max_text_size_pt: 7
  panel_label_font_size_pt: 8
  panel_label_font_weight: "bold"
  panel_label_case: "lower"
