bundle_id: "bundle_ai_ml_evaluation_exemplar"
recipe_id: "ai_ml_evaluation_story"
family: "ai_ml_professional"
expertise_track: "ai_for_science"
acceptance_tier: "exemplar"
target_manuscript_section: "results"
wiring_mode: "additive_drafts"
figure_order:
  - "figure_06_roc_pr_compound"
  - "figure_07_calibration_reliability"
  - "figure_08_training_dynamics"
  - "figure_09_confusion_matrix_normalized"
  - "figure_10_feature_importance_summary"
  - "figure_11_ablation_summary"
  - "figure_12_embedding_projection"
  - "figure_13_uncertainty_abstention_curve"
figures:
  - slot_id: "discrimination"
    class_id: "roc_pr_compound"
    figure_id: "figure_06_roc_pr_compound"
    role: "Primary model discrimination and class-imbalance evaluation"
    display_order: 1
    claim_ids:
      - "claim_foundation_model_improves_discrimination"
      - "claim_foundation_model_retains_precision_under_imbalance"
    spec_path: "figures/specs/figure_06_roc_pr_compound.yml"
    fact_sheet: "figures/fact_sheets/figure_06_roc_pr_compound.json"
    legend_path: "manuscript/legends/figure_06_roc_pr_compound.md"
    source_data:
      - "figures/source_data/figure_06_panel_a.csv"
      - "figures/source_data/figure_06_panel_b.csv"
  - slot_id: "calibration"
    class_id: "calibration_reliability"
    figure_id: "figure_07_calibration_reliability"
    role: "Probability calibration and confidence support"
    display_order: 2
    claim_ids:
      - "claim_foundation_model_best_calibrated"
      - "claim_high_confidence_support_is_not_tail_only"
    spec_path: "figures/specs/figure_07_calibration_reliability.yml"
    fact_sheet: "figures/fact_sheets/figure_07_calibration_reliability.json"
    legend_path: "manuscript/legends/figure_07_calibration_reliability.md"
    source_data:
      - "figures/source_data/figure_07_panel_a.csv"
      - "figures/source_data/figure_07_panel_b.csv"
  - slot_id: "optimization"
    class_id: "training_dynamics"
    figure_id: "figure_08_training_dynamics"
    role: "Training stability and convergence behavior"
    display_order: 3
    claim_ids:
      - "claim_foundation_model_optimizes_stably"
      - "claim_foundation_model_reaches_higher_validation_auroc"
    spec_path: "figures/specs/figure_08_training_dynamics.yml"
    fact_sheet: "figures/fact_sheets/figure_08_training_dynamics.json"
    legend_path: "manuscript/legends/figure_08_training_dynamics.md"
    source_data:
      - "figures/source_data/figure_08_panel_a.csv"
      - "figures/source_data/figure_08_panel_b.csv"
  - slot_id: "error_modes"
    class_id: "confusion_matrix_normalized"
    figure_id: "figure_09_confusion_matrix_normalized"
    role: "Structured failure-mode inspection"
    display_order: 4
    claim_ids:
      - "claim_errors_are_localized_to_adjacent_states"
      - "claim_terminal_states_remain_distinct"
    spec_path: "figures/specs/figure_09_confusion_matrix_normalized.yml"
    fact_sheet: "figures/fact_sheets/figure_09_confusion_matrix_normalized.json"
    legend_path: "manuscript/legends/figure_09_confusion_matrix_normalized.md"
    source_data:
      - "figures/source_data/figure_09_panel_a.csv"
      - "figures/source_data/figure_09_panel_b.csv"
  - slot_id: "interpretation"
    class_id: "feature_importance_summary"
    figure_id: "figure_10_feature_importance_summary"
    role: "Feature-level interpretation summary"
    display_order: 5
    claim_ids:
      - "claim_model_relies_on_biologically_salient_features"
      - "claim_signed_feature_effects_align_with_domain_expectation"
    spec_path: "figures/specs/figure_10_feature_importance_summary.yml"
    fact_sheet: "figures/fact_sheets/figure_10_feature_importance_summary.json"
    legend_path: "manuscript/legends/figure_10_feature_importance_summary.md"
    source_data:
      - "figures/source_data/figure_10_panel_a.csv"
      - "figures/source_data/figure_10_panel_b.csv"
  - slot_id: "design_justification"
    class_id: "ablation_summary"
    figure_id: "figure_11_ablation_summary"
    role: "Ablation support for architectural and training choices"
    display_order: 6
    claim_ids:
      - "claim_context_encoder_and_fusion_drive_primary_performance"
      - "claim_calibration_loss_mainly_affects_probability_quality"
    spec_path: "figures/specs/figure_11_ablation_summary.yml"
    fact_sheet: "figures/fact_sheets/figure_11_ablation_summary.json"
    legend_path: "manuscript/legends/figure_11_ablation_summary.md"
    source_data:
      - "figures/source_data/figure_11_panel_a.csv"
      - "figures/source_data/figure_11_panel_b.csv"
  - slot_id: "representation"
    class_id: "embedding_projection"
    figure_id: "figure_12_embedding_projection"
    role: "Representation geometry and cross-domain support"
    display_order: 7
    claim_ids:
      - "claim_embedding_projection_preserves_state_structure"
      - "claim_embedding_structure_has_cross_domain_support"
    spec_path: "figures/specs/figure_12_embedding_projection.yml"
    fact_sheet: "figures/fact_sheets/figure_12_embedding_projection.json"
    legend_path: "manuscript/legends/figure_12_embedding_projection.md"
    source_data:
      - "figures/source_data/figure_12_panel_a.csv"
      - "figures/source_data/figure_12_panel_b.csv"
  - slot_id: "selective_prediction"
    class_id: "uncertainty_abstention_curve"
    figure_id: "figure_13_uncertainty_abstention_curve"
    role: "Uncertainty-guided abstention and retained-coverage behavior"
    display_order: 8
    claim_ids:
      - "claim_uncertainty_abstention_reduces_deployment_risk"
      - "claim_foundation_model_retains_higher_coverage_at_target_risk"
    spec_path: "figures/specs/figure_13_uncertainty_abstention_curve.yml"
    fact_sheet: "figures/fact_sheets/figure_13_uncertainty_abstention_curve.json"
    legend_path: "manuscript/legends/figure_13_uncertainty_abstention_curve.md"
    source_data:
      - "figures/source_data/figure_13_panel_a.csv"
      - "figures/source_data/figure_13_panel_b.csv"
bundle_outputs:
  review_page: "figures/output/review/bundles/bundle_ai_ml_evaluation_exemplar/index.html"
  summary_json: "figures/output/bundles/bundle_ai_ml_evaluation_exemplar/summary.json"
manuscript_fragments:
