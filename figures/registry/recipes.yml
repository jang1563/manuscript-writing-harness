recipes:
  bulk_omics_deg_story:
    recipe_id: "bulk_omics_deg_story"
    family: "bulk_omics"
    expertise_track: "bioinformatics"
    intent: "Core RNA-seq or proteomics differential-signal story that moves from sample structure to differential signal to pathway interpretation."
    recommended_sequence:
      - slot_id: "sample_structure"
        class_id: "sample_pca"
        role: "QC and cohort-separation overview"
        default_figure_id: "figure_sample_pca"
      - slot_id: "ma_overview"
        class_id: "ma_plot"
        role: "Global differential-signal overview"
        default_figure_id: "figure_ma_plot"
      - slot_id: "de_pathway_story"
        class_id: "volcano_pathway_compound"
        role: "Main differential-expression and pathway interpretation figure"
        default_figure_id: "figure_volcano_pathway"
      - slot_id: "pathway_focus"
        class_id: "pathway_enrichment_dot"
        role: "Focused pathway-enrichment follow-up"
        default_figure_id: "figure_pathway_dot"
    notes:
      - "Use this when the paper narrative is sample QC -> DE signal -> pathway interpretation."
      - "The volcano-pathway compound figure is usually the main Results figure in this bundle."
  ai_ml_evaluation_story:
    recipe_id: "ai_ml_evaluation_story"
    family: "ai_ml_professional"
    expertise_track: "ai_for_science"
    intent: "Professional AI/ML evaluation bundle covering discrimination, calibration, optimization, failure modes, interpretation, and ablation."
    recommended_sequence:
      - slot_id: "discrimination"
        class_id: "roc_pr_compound"
        role: "Primary model discrimination and class-imbalance evaluation"
        default_figure_id: "figure_roc_pr"
      - slot_id: "calibration"
        class_id: "calibration_reliability"
        role: "Probability calibration and confidence support"
        default_figure_id: "figure_calibration"
      - slot_id: "optimization"
        class_id: "training_dynamics"
        role: "Training stability and convergence behavior"
        default_figure_id: "figure_training_dynamics"
      - slot_id: "error_modes"
        class_id: "confusion_matrix_normalized"
        role: "Structured failure-mode inspection"
        default_figure_id: "figure_confusion_matrix"
      - slot_id: "interpretation"
        class_id: "feature_importance_summary"
        role: "Feature-level interpretation summary"
        default_figure_id: "figure_feature_importance"
      - slot_id: "design_justification"
        class_id: "ablation_summary"
        role: "Ablation support for architectural and training choices"
        default_figure_id: "figure_ablation"
    notes:
      - "Use this when the paper needs a top-conference or methods-paper evaluation arc."
      - "At minimum, discrimination and calibration should appear together for probabilistic models."
