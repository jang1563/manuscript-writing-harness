schema_version: 1
description: >
  Defines the fields for risk-of-bias assessments.
  Structured to be compatible with robvis input format.
  Supports RoB 2 (RCTs) and ROBINS-I (non-randomised studies).

required_fields:
  - name: record_id
    type: string
    description: Links to the screening/extraction record

  - name: tool
    type: enum
    values: [rob2, robins_i, newcastle_ottawa, custom]
    description: Risk-of-bias assessment tool used

  - name: overall_judgment
    type: enum
    values: [low, some_concerns, high, no_information]

  - name: assessor
    type: string

  - name: ai_assisted
    type: boolean
    description: Whether AI was used for initial triage

  - name: timestamp
    type: string
    description: ISO datetime

# RoB 2 domains (for tool=rob2)
rob2_domains:
  - D1_randomisation
  - D2_deviations
  - D3_missing_data
  - D4_measurement
  - D5_selection_reporting

# ROBINS-I domains (for tool=robins_i)
robins_i_domains:
  - D1_confounding
  - D2_selection
  - D3_classification
  - D4_deviations
  - D5_missing_data
  - D6_measurement
  - D7_selection_reporting

domain_judgment_values: [low, moderate, serious, critical, no_information]
