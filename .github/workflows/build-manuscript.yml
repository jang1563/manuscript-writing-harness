name: build-manuscript

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Set up R
        uses: r-lib/actions/setup-r@v2
        with:
          r-version: "release"

      - name: Install Python dependencies
        run: |
          python3 -m pip install -r env/requirements-myst.txt
          python3 -m pip install -r env/requirements-phase2.txt

      - name: Install R dependencies
        run: Rscript env/install_r_figure_deps.R

      - name: Validate scaffold
        run: python3 scripts/check_scaffold.py

      - name: Build Phase 2 artifacts
        run: python3 scripts/build_phase2.py

      - name: Run Python figure tests
        run: python3 -m pytest tests/figures/python

      - name: Run R figure tests
        run: Rscript tests/figures/r/testthat.R

      - name: Build manuscript HTML
        working-directory: manuscript
        run: myst build --html

      - name: Upload HTML artifact
        uses: actions/upload-artifact@v4
        with:
          name: manuscript-html
          path: manuscript/_build/html

      - name: Upload figure artifact bundle
        uses: actions/upload-artifact@v4
        with:
          name: phase2-figures
          path: |
            figures/output
            figures/source_data

      - name: Upload table artifact bundle
        uses: actions/upload-artifact@v4
        with:
          name: phase2-tables
          path: tables/output
