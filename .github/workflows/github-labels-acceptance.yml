name: github-labels-acceptance

on:
  push:
    branches:
      - main
    paths:
      - ".github/labels.yml"
      - ".github/workflows/github-labels-acceptance.yml"
      - "scripts/github_labels.py"
      - "scripts/sync_github_labels.py"
      - "tests/figures/python/test_github_labels.py"
  pull_request:
    paths:
      - ".github/labels.yml"
      - ".github/workflows/github-labels-acceptance.yml"
      - "scripts/github_labels.py"
      - "scripts/sync_github_labels.py"
      - "tests/figures/python/test_github_labels.py"
  workflow_dispatch:

permissions:
  contents: read
  issues: read

jobs:
  github-labels:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Python dependencies
        run: python3 -m pip install -r env/requirements-phase2.txt

      - name: Validate scaffold
        run: python3 scripts/check_scaffold.py

      - name: Run GitHub label tests
        run: python3 -m pytest tests/figures/python/test_github_labels.py -q

      - name: Check GitHub label drift
        env:
          GH_TOKEN: ${{ github.token }}
        run: python3 scripts/sync_github_labels.py --repo "${{ github.repository }}" --dry-run --json --strict > .github-label-sync-report.json

      - name: Write GitHub label summary
        if: always()
        run: |
          python3 - <<'PY'
          import json
          import os
          from pathlib import Path

          report_path = Path(".github-label-sync-report.json")
          lines = ["# GitHub Label Acceptance", ""]
          if report_path.exists():
              payload = json.loads(report_path.read_text(encoding="utf-8"))
              lines.extend(
                  [
                      f"- repo: `{payload['repo'] or 'current gh repository'}`",
                      f"- manifest: `{payload['manifest_path']}`",
                      f"- desired labels: `{payload['desired_count']}`",
                      f"- remote labels: `{payload['remote_count']}`",
                      f"- created: `{len(payload['created'])}`",
                      f"- updated: `{len(payload['updated'])}`",
                      f"- deleted: `{len(payload['deleted'])}`",
                      f"- unchanged: `{len(payload['unchanged'])}`",
                      f"- strict-ready: `{'yes' if not payload['operations'] else 'no'}`",
                  ]
              )
              if payload["operations"]:
                  lines.extend(["", "## Planned operations", ""])
                  for operation in payload["operations"]:
                      lines.append(f"- {operation['action']}: `{operation['name']}`")
          else:
              lines.append("- strict-ready: `unknown`")
              lines.append("- report: `.github-label-sync-report.json` was not produced")

          summary = "\n".join(lines) + "\n"
          Path(".github-labels-summary.md").write_text(summary, encoding="utf-8")
          Path(os.environ["GITHUB_STEP_SUMMARY"]).write_text(summary, encoding="utf-8")
          print(summary)
          PY

      - name: Upload GitHub label artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: github-label-artifacts
          path: |
            .github-label-sync-report.json
            .github-labels-summary.md
