name: soak-acceptance

on:
  push:
    branches:
      - main
  pull_request:

concurrency:
  group: soak-acceptance-${{ github.ref }}
  cancel-in-progress: true

jobs:
  soak:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Set up R
        uses: r-lib/actions/setup-r@v2
        with:
          r-version: "release"

      - name: Create local toolchain layout
        run: |
          python3 -m venv .venv
          mkdir -p .nodeenv/bin
          ln -sf "$(command -v node)" .nodeenv/bin/node
          ln -sf "$(command -v npm)" .nodeenv/bin/npm
          ln -sf "$(command -v npx)" .nodeenv/bin/npx

      - name: Install Python dependencies into repo venv
        run: |
          ./.venv/bin/pip install -r env/requirements-myst.txt
          ./.venv/bin/pip install -r env/requirements-phase2.txt

      - name: Install R dependencies
        run: Rscript env/install_r_figure_deps.R

      - name: Run deterministic short soak
        run: |
          ./.venv/bin/python scripts/run_ci_soak_acceptance.py --write-step-summary

      - name: Upload soak report artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: soak-acceptance-report
          path: |
            reports/overnight
            /tmp/manuscript_overnight_ci
