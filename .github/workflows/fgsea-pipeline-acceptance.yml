name: fgsea-pipeline-acceptance

on:
  push:
    paths:
      - "pathways/**"
      - "scripts/fgsea_pipeline.py"
      - "scripts/scaffold_fgsea_study.py"
      - "scripts/activate_fgsea_profile.py"
      - "scripts/run_fgsea_pipeline.R"
      - "env/install_r_figure_deps.R"
      - ".github/workflows/fgsea-pipeline-acceptance.yml"
  pull_request:
    paths:
      - "pathways/**"
      - "scripts/fgsea_pipeline.py"
      - "scripts/scaffold_fgsea_study.py"
      - "scripts/activate_fgsea_profile.py"
      - "scripts/run_fgsea_pipeline.R"
      - "env/install_r_figure_deps.R"
      - ".github/workflows/fgsea-pipeline-acceptance.yml"

jobs:
  fgsea-demo:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - uses: r-lib/actions/setup-r@v2
        with:
          r-version: "release"

      - name: Install Python deps
        run: python3 -m pip install -r env/requirements-phase2.txt

      - name: Install R deps
        run: Rscript env/install_r_figure_deps.R

      - name: Validate fgsea demo config
        run: python3 scripts/fgsea_pipeline.py validate --config pathways/configs/fgsea_demo.yml --json

      - name: Validate fgsea active config
        run: python3 scripts/fgsea_pipeline.py validate --config pathways/configs/fgsea_active.yml --json

      - name: Run fgsea active profile
        run: python3 scripts/fgsea_pipeline.py run --config pathways/configs/fgsea_active.yml --allow-missing-package --json

      - name: Upload fgsea artifacts
        uses: actions/upload-artifact@v4
        with:
          name: fgsea-results
          path: |
            pathways/results
