name: repo-maturity-acceptance

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  repo-maturity:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up R
        uses: r-lib/actions/setup-r@v2
        with:
          r-version: "release"

      - name: Install Python dependencies
        run: |
          python3 -m pip install -r env/requirements-myst.txt
          python3 -m pip install -r env/requirements-phase2.txt

      - name: Install R dependencies
        run: Rscript env/install_r_figure_deps.R

      - name: Run repo maturity acceptance
        run: python3 scripts/run_repo_maturity_acceptance.py --profile submission-framework --strict --write-step-summary

      - name: Check repo maturity acceptance artifact
        run: python3 scripts/check_repo_maturity_acceptance.py --profile submission-framework --json

      - name: Upload repo maturity artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: repo-maturity-artifacts
          path: |
            workflows/release/reports/repo_maturity_submission-framework.json
            workflows/release/reports/repo_maturity_submission-framework.md
            workflows/release/manifests/repo_maturity_submission-framework.json
            workflows/release/manifests/repo_maturity_submission-framework_acceptance.json
            workflows/release/reports/repo_maturity_submission-framework_acceptance
